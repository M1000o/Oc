<div class="send-modal-overlay" (click)="onBackdropClick($event)">
  <section class="send-modal" role="dialog" aria-modal="true" aria-labelledby="sendOrderModalTitle">
    <header class="send-modal-header">
      <div class="send-modal-heading">
        <div class="send-modal-icon">
          <mat-icon aria-hidden="true">mail</mat-icon>
        </div>
        <div>
          <h2 id="sendOrderModalTitle">Enviar Orden de Compra</h2>
          <p>Documento adjunto: {{ attachmentName() }}</p>
        </div>
      </div>

      <button class="send-modal-close" type="button" (click)="close()" aria-label="Cerrar modal">
        <mat-icon aria-hidden="true">close</mat-icon>
      </button>
    </header>

    <div class="send-modal-body">
      <label class="composer-field">
        <span class="composer-label-row">
          <span>Para (Proveedor)</span>
          <strong>Contacto verificado</strong>
        </span>
        <div class="composer-input-wrap">
          <mat-icon aria-hidden="true">person</mat-icon>
          <input
            type="email"
            [(ngModel)]="draftRecipientEmail"
            [disabled]="isSubmitting()"
            [placeholder]="isLoadingRecipientEmail() ? 'Cargando correo del proveedor...' : 'correo@proveedor.com'"
          />
        </div>
      </label>

      <label class="composer-field">
        <span class="composer-label-row">
          <span>Asunto</span>
        </span>
        <div class="composer-input-wrap">
          <mat-icon aria-hidden="true">subject</mat-icon>
          <input type="text" [(ngModel)]="draftEmailSubject" [disabled]="isSubmitting()" />
        </div>
      </label>

      <div class="composer-field">
        <span class="composer-label-row">
          <span>Mensaje Personalizado</span>
        </span>
        <div class="composer-editor">
          <div class="composer-toolbar" aria-hidden="true">
            <button type="button"><mat-icon>format_bold</mat-icon></button>
            <button type="button"><mat-icon>format_italic</mat-icon></button>
            <button type="button"><mat-icon>format_list_bulleted</mat-icon></button>
            <span class="composer-toolbar-divider"></span>
            <button type="button"><mat-icon>link</mat-icon></button>
          </div>
          <textarea
            [(ngModel)]="draftEmailMessage"
            [disabled]="isSubmitting()"
            placeholder="Escribe una nota para el proveedor..."
          ></textarea>
        </div>
      </div>

      <button
        type="button"
        class="composer-attachment composer-attachment-button"
        (click)="previewAttachment()"
        [disabled]="isSubmitting()"
        aria-label="Abrir vista previa del PDF"
      >
        <div class="composer-attachment-icon">
          <mat-icon aria-hidden="true">picture_as_pdf</mat-icon>
        </div>
        <div class="composer-attachment-copy">
          <strong>{{ attachmentName() }}</strong>
          <span>124 KB • Vista previa generada</span>
        </div>
        <span class="composer-attachment-open" aria-hidden="true">
          <mat-icon>open_in_new</mat-icon>
        </span>
      </button>

      <div class="composer-attachment-actions">
        <button type="button" class="composer-attachment-delete" aria-label="Eliminar adjunto">
          <mat-icon aria-hidden="true">delete</mat-icon>
        </button>
      </div>
    </div>

    <footer class="send-modal-footer">
      <button class="footer-link-btn" type="button" [disabled]="isSubmitting()">
        <mat-icon aria-hidden="true">attach_file</mat-icon>
        Adjuntar otros archivos
      </button>

      <div class="send-modal-actions">
        <button class="btn btn-text" type="button" (click)="close()" [disabled]="isSubmitting()">Cancelar</button>
        <button class="btn btn-send" type="button" (click)="submit()" [disabled]="isSubmitting()">
          <mat-icon aria-hidden="true">send</mat-icon>
          {{ isSubmitting() ? 'Enviando...' : 'Enviar Orden' }}
        </button>
      </div>
    </footer>
  </section>
</div>
