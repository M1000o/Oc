<header class="portal-header">
  <div class="header-start">
    <button
      class="menu-toggle"
      type="button"
      [attr.aria-label]="sidebarVisible ? 'Ocultar sidebar' : 'Mostrar sidebar'"
      (click)="onToggleSidebarClick()"
    >
      <mat-icon aria-hidden="true">{{ sidebarVisible ? 'chevron_left' : 'chevron_right' }}</mat-icon>
    </button>
    <h1>{{ title }}</h1>
  </div>

  <div class="header-end">
    <ng-content></ng-content>
  </div>
</header>
